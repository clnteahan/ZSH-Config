# Get editor completions based on the config schema
"$schema" = '~/.zsh/schema/config-schema.json'

# Enable the blank line at the start of the prompt
add_newline = true

# Timeout in ms for commands executed by starship (default = 500).
command_timeout = 5000

[character] # The name of the module we are configuring is 'character'
success_symbol = '[ÔØ»](bold green)'
error_symbol = '[ÔØ»](bold red)'
disabled = false

# You can also replace your username with a neat symbol like ´äá  or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#9A348E"
disabled = false # Disabled by default

[os.symbols]
Arch = "¾░úç "
Debian = "¾░úÜ "
Ubuntu = "¾░òê "
Gentoo = "¾░ú¿ "
CachyOS = "¾░½░ "
Fedora = "¾░úø "
Pop = "´î¬ "
Windows = "¾░û│ "

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 10
truncation_symbol = "ÔÇª/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ¾░êÖ´ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ¾░êÖ " = " ¾░êÖ´ä¬ "

[c]
symbol = "¯ÿ× "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'
detect_extensions = ['c']

[cpp]
